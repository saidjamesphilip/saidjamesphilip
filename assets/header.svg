<svg width="800" height="140" viewBox="0 0 800 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A4A4A"/>
      <stop offset="100%" stop-color="#2A2A2A"/>
    </linearGradient>
  </defs>

  <!-- Outer border - gold/bronze like GBA dialog -->
  <rect x="0" y="0" width="800" height="140" rx="12" fill="#C8A84E"/>
  <!-- Inner border -->
  <rect x="3" y="3" width="794" height="134" rx="10" fill="#8B7332"/>
  <!-- Dark inner background -->
  <rect x="6" y="6" width="788" height="128" rx="8" fill="#1A1A2E"/>
  <!-- Subtle inner highlight -->
  <rect x="8" y="8" width="784" height="124" rx="7" fill="#1E1E32"/>

  <!-- Corner decorations - pixel style -->
  <rect x="14" y="14" width="6" height="6" fill="#C8A84E" opacity="0.6"/>
  <rect x="14" y="22" width="4" height="4" fill="#C8A84E" opacity="0.3"/>
  <rect x="22" y="14" width="4" height="4" fill="#C8A84E" opacity="0.3"/>

  <rect x="780" y="14" width="6" height="6" fill="#C8A84E" opacity="0.6"/>
  <rect x="782" y="22" width="4" height="4" fill="#C8A84E" opacity="0.3"/>
  <rect x="774" y="14" width="4" height="4" fill="#C8A84E" opacity="0.3"/>

  <!-- Main heading text -->
  <text x="400" y="55" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="32" fill="#FFFFFF" letter-spacing="2">
    Hey, I'm JAMES
  </text>

  <!-- Subtitle -->
  <text x="400" y="85" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#C8A84E" letter-spacing="1">
    Head of Product  ·  Marketplaces  ·  Sports  ·  Jobs
  </text>

  <!-- Tagline -->
  <text x="400" y="108" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#9A9AB0" letter-spacing="0.5">
    Building products that connect people with what matters most.
  </text>

  <!-- Bottom accent line -->
  <rect x="200" y="120" width="400" height="2" fill="#C8A84E" opacity="0.3" rx="1"/>

  <!-- Blinking cursor pixel -->
  <rect x="770" y="110" width="8" height="12" fill="#C8A84E" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
