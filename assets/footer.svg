<svg xmlns="http://www.w3.org/2000/svg" width="500" height="16" viewBox="0 0 500 16" style="image-rendering: pixelated;">
  <!-- Pixel art divider with pokeballs and dots -->

  <!-- Left line of pixels -->
  <g fill="#C83030" opacity="0.6">
    <rect x="40" y="7" width="80" height="2"/>
  </g>
  <g fill="#E8A030" opacity="0.4">
    <rect x="120" y="7" width="40" height="2"/>
  </g>

  <!-- Left pokeball -->
  <g transform="translate(170, 2)">
    <circle cx="6" cy="6" r="5" fill="#F0F0F0" stroke="#383838" stroke-width="1"/>
    <line x1="1" y1="6" x2="11" y2="6" stroke="#383838" stroke-width="0.8"/>
    <path d="M1 6 A5 5 0 0 0 11 6" fill="#C83030"/>
    <circle cx="6" cy="6" r="1.5" fill="#F0F0F0" stroke="#383838" stroke-width="0.5"/>
  </g>

  <!-- Pixel dots -->
  <rect x="192" y="6" width="3" height="3" fill="#E8A030">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="202" y="6" width="3" height="3" fill="#C83030">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="212" y="6" width="3" height="3" fill="#FFB7C5">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </rect>

  <!-- Center star/sparkle -->
  <g transform="translate(247, 4)" fill="#FFD700">
    <rect x="3" y="0" width="2" height="8">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="3" width="8" height="2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="1" y="1" width="2" height="2" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="5" y="1" width="2" height="2" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="1" y="5" width="2" height="2" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="5" y="5" width="2" height="2" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Right pixel dots -->
  <rect x="285" y="6" width="3" height="3" fill="#FFB7C5">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </rect>
  <rect x="295" y="6" width="3" height="3" fill="#C83030">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="305" y="6" width="3" height="3" fill="#E8A030">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Right pokeball -->
  <g transform="translate(318, 2)">
    <circle cx="6" cy="6" r="5" fill="#F0F0F0" stroke="#383838" stroke-width="1"/>
    <line x1="1" y1="6" x2="11" y2="6" stroke="#383838" stroke-width="0.8"/>
    <path d="M1 6 A5 5 0 0 0 11 6" fill="#C83030"/>
    <circle cx="6" cy="6" r="1.5" fill="#F0F0F0" stroke="#383838" stroke-width="0.5"/>
  </g>

  <!-- Right line of pixels -->
  <g fill="#E8A030" opacity="0.4">
    <rect x="340" y="7" width="40" height="2"/>
  </g>
  <g fill="#C83030" opacity="0.6">
    <rect x="380" y="7" width="80" height="2"/>
  </g>
</svg>