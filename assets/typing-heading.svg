<svg xmlns="http://www.w3.org/2000/svg" width="460" height="50" viewBox="0 0 460 50" style="image-rendering: pixelated;">
  <defs>
    <clipPath id="reveal">
      <rect x="0" y="0" height="50">
        <animate attributeName="width"
          values="0;22;44;66;88;110;132;154;176;198;220;242;264;286;308"
          keyTimes="0;0.067;0.133;0.2;0.267;0.333;0.4;0.467;0.533;0.6;0.667;0.733;0.8;0.867;1"
          dur="9s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- GBA-style text with shadow -->
  <text x="2" y="38" font-family="monospace" font-size="32" font-weight="700" fill="#383838" clip-path="url(#reveal)" opacity="0.3">Hey, I'm James</text>
  <text x="0" y="36" font-family="monospace" font-size="32" font-weight="700" fill="#282838" clip-path="url(#reveal)">Hey, I'm James</text>

  <!-- Blinking cursor -->
  <rect y="8" width="3" height="32" rx="1" fill="#C83030">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="x"
      values="1;23;45;67;89;111;133;155;177;199;221;243;265;287;309"
      keyTimes="0;0.067;0.133;0.2;0.267;0.333;0.4;0.467;0.533;0.6;0.667;0.733;0.8;0.867;1"
      dur="9s" fill="freeze"/>
  </rect>
</svg>