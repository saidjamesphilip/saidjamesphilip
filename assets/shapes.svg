<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" result="blur">
        <animate attributeName="stdDeviation" values="1;3;1" dur="6s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.89 0 0 0 0 0.29 0 0 0 0 0.30 0 0 0 0.6 0" result="redGlow"/>
      <feMerge>
        <feMergeNode in="redGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rotating torii outline -->
  <g filter="url(#glow)" opacity="0.7">
    <rect x="80" y="50" width="5" height="50" fill="none" stroke="#E2414C" stroke-width="1.5">
      <animateTransform attributeName="transform" type="rotate" values="0 100 80;360 100 80" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="6s" repeatCount="indefinite"/>
    </rect>
    <rect x="115" y="50" width="5" height="50" fill="none" stroke="#E2414C" stroke-width="1.5">
      <animateTransform attributeName="transform" type="rotate" values="0 100 80;360 100 80" dur="20s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Counter-rotating diamond -->
  <rect x="75" y="55" width="50" height="50" fill="none" stroke="#FFB7C5" stroke-width="1" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" values="45 100 80;-315 100 80" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Pulsing circle (sakura ring) -->
  <circle cx="100" cy="80" r="35" fill="none" stroke="#E2414C" stroke-width="1" opacity="0.4">
    <animate attributeName="r" values="35;42;35" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.2;0.6;0.2" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Small orbiting dot -->
  <circle cx="100" cy="35" r="3" fill="#FFB7C5" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" values="0 100 80;360 100 80" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Inner triangle -->
  <polygon points="100,55 125,95 75,95" fill="none" stroke="#FFB7C5" stroke-width="0.8" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" values="0 100 80;-360 100 80" dur="25s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="7s" repeatCount="indefinite"/>
  </polygon>

  <!-- Pokeball outline orbiting -->
  <g opacity="0.5">
    <circle cx="100" cy="30" r="8" fill="none" stroke="#DAA520" stroke-width="0.8">
      <animateTransform attributeName="transform" type="rotate" values="0 100 80;-360 100 80" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <line x1="92" y1="30" x2="108" y2="30" stroke="#DAA520" stroke-width="0.5">
      <animateTransform attributeName="transform" type="rotate" values="0 100 80;-360 100 80" dur="12s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>