<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180" style="image-rendering: pixelated;">
  <!-- Pokeball animation -->
  <g transform="translate(90, 70)">
    <!-- Outer pokeball -->
    <circle cx="0" cy="0" r="32" fill="#F0F0F0" stroke="#383838" stroke-width="3">
      <animateTransform attributeName="transform" type="rotate" values="0;5;-5;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <path d="M-32 0 A32 32 0 0 0 32 0" fill="#C83030">
      <animateTransform attributeName="transform" type="rotate" values="0;5;-5;0" dur="3s" repeatCount="indefinite"/>
    </path>
    <line x1="-32" y1="0" x2="32" y2="0" stroke="#383838" stroke-width="3">
      <animateTransform attributeName="transform" type="rotate" values="0;5;-5;0" dur="3s" repeatCount="indefinite"/>
    </line>
    <circle cx="0" cy="0" r="8" fill="#F0F0F0" stroke="#383838" stroke-width="2.5">
      <animateTransform attributeName="transform" type="rotate" values="0;5;-5;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="4" fill="#F8F8F8">
      <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#F8F8F8;#FFFFFF;#F8F8F8" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Sparkles around pokeball -->
  <g fill="#FFD700">
    <rect x="130" y="40" width="4" height="4">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="46" y="50" width="3" height="3">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="120" y="90" width="3" height="3">
      <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="50" y="85" width="4" height="4">
      <animate attributeName="opacity" values="0;1;0" dur="2.2s" begin="0.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Pixel stars -->
  <g fill="#FFB7C5">
    <rect x="140" y="20" width="3" height="3">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="30" y="30" width="3" height="3">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="150" y="110" width="3" height="3">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Small pixel Pikachu-like creature at bottom -->
  <g transform="translate(60, 130)">
    <!-- Body -->
    <rect x="8" y="8" width="20" height="16" fill="#F8D030" rx="2"/>
    <!-- Ears -->
    <rect x="8" y="0" width="4" height="10" fill="#F8D030"/>
    <rect x="8" y="0" width="4" height="4" fill="#282828"/>
    <rect x="24" y="0" width="4" height="10" fill="#F8D030"/>
    <rect x="24" y="0" width="4" height="4" fill="#282828"/>
    <!-- Eyes -->
    <rect x="12" y="12" width="4" height="4" fill="#282828"/>
    <rect x="20" y="12" width="4" height="4" fill="#282828"/>
    <!-- Cheeks -->
    <rect x="8" y="16" width="4" height="4" fill="#E83838"/>
    <rect x="24" y="16" width="4" height="4" fill="#E83838"/>
    <!-- Tail -->
    <rect x="28" y="4" width="4" height="4" fill="#F8D030"/>
    <rect x="32" y="0" width="4" height="8" fill="#F8D030"/>
    <rect x="36" y="0" width="4" height="4" fill="#F8D030"/>
  </g>
</svg>